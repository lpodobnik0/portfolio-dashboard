name: Fetch Stock Prices

on:
  workflow_dispatch: # Triggered by cron-job.org every 15 min (and manually)

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices and FX rates
        run: |
          python3 << 'EOF'
          import json, urllib.request, time, os

          if not os.path.exists('tickers.txt'):
              print("tickers.txt not found — nothing to do")
              exit(0)

          # Parse tickers — supports "TICKER" or "DASHBOARD_KEY=YAHOO_TICKER" format
          with open('tickers.txt') as f:
              raw = [t.strip() for t in f if t.strip() and not t.startswith('#')]
          ticker_map = {}  # dashboard_key -> yahoo_ticker
          for entry in raw:
              if '=' in entry:
                  key, yahoo = entry.split('=', 1)
                  ticker_map[key.strip().upper()] = yahoo.strip().upper()
              else:
                  ticker_map[entry.upper()] = entry.upper()

          print(f"Fetching {len(ticker_map)} tickers: {ticker_map}")

          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def fetch_yahoo(key, ticker):
              url = f'https://query1.finance.yahoo.com/v8/finance/chart/{ticker}?interval=1d&range=1d'
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              meta = data['chart']['result'][0]['meta']
              price = (meta.get('regularMarketPrice') or
                       meta.get('chartPreviousClose') or
                       meta.get('previousClose'))
              if not price:
                  raise ValueError(f"no price field. Keys: {list(meta.keys())}")
              result = {'price': price, 'currency': meta.get('currency', 'USD'), 'name': meta.get('shortName', ticker)}
              # ex-dividend date (prefer exDividendDate, fall back to dividendDate)
              import datetime
              for field in ('exDividendDate', 'dividendDate'):
                  ts = meta.get(field)
                  if ts and int(ts) > 0:
                      result['exDividendDate'] = datetime.datetime.utcfromtimestamp(int(ts)).strftime('%Y-%m-%d')
                      break
              # annual dividend rate
              for field in ('dividendRate', 'trailingAnnualDividendRate'):
                  rate = meta.get(field)
                  if rate and float(rate) > 0:
                      result['dividendRate'] = float(rate)
                      break
              return result

          def fetch_yahoo_dividends(key, ticker):
              """Fetch up to 3 years of dividend history for a ticker from Yahoo Finance."""
              import datetime
              url = f'https://query1.finance.yahoo.com/v8/finance/chart/{ticker}?interval=1d&range=3y&events=div'
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              result = data['chart']['result'][0]
              events = result.get('events', {})
              divs = events.get('dividends', {})
              out = []
              for ts, d in divs.items():
                  dt = datetime.datetime.utcfromtimestamp(int(ts)).strftime('%Y-%m-%d')
                  out.append({'date': dt, 'amount': d['amount']})
              return sorted(out, key=lambda x: x['date'])

          def fetch_stooq(key, ticker):
              import csv, io
              url = f'https://stooq.com/q/l/?s={ticker}&f=sd2t2ohlcvn&h&e=csv'
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=10) as r:
                  content = r.read().decode('utf-8')
              reader = csv.DictReader(io.StringIO(content))
              row = next(reader)
              price = float(row.get('Close') or row.get('close') or 0)
              if not price:
                  raise ValueError(f"no price in Stooq response: {row}")
              return {'price': price, 'currency': 'EUR', 'name': key}

          def fetch_zse(key, ticker):
              import datetime, re
              # ticker format: {ISIN}.ZSE  e.g. HRHT00RA0005.ZSE
              isin = ticker.upper().replace('.ZSE', '')
              today = datetime.date.today()
              from_date = (today - datetime.timedelta(days=10)).strftime('%Y-%m-%d')
              to_date = today.strftime('%Y-%m-%d')
              url = (f'https://rest.zse.hr/web/Bvt9fe2peQ7pwpyYqODM'
                     f'/security-history/XZAG/{isin}/{from_date}/{to_date}/json?language=EN')
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
              history = data.get('history') if isinstance(data, dict) else data
              if not history:
                  raise ValueError(f"empty ZSE history for ISIN {isin}")
              records = sorted(history, key=lambda r: r.get('date', ''), reverse=True)
              latest = records[0]
              price = float(latest.get('last_price') or latest.get('vwap_price') or 0)
              if not price:
                  raise ValueError(f"no price in ZSE record: {latest}")
              result = {'price': price, 'currency': 'EUR', 'name': key}
              # Scrape dividend info from ZSE web page (embedded as this.Papir JSON)
              try:
                  page_url = f'https://zse.hr/en/papir-311/310?isin={isin}'
                  req2 = urllib.request.Request(page_url, headers=HEADERS)
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                      page = r2.read().decode('utf-8')
                  m = re.search(r'this\.Papir\s*=\s*(\{.+?\});', page, re.DOTALL)
                  if m:
                      papir = json.loads(m.group(1))
                      div_val = float(papir.get('dividend_value') or 0)
                      ex_date = (papir.get('dividend_ex_date') or '')[:10]
                      if div_val and ex_date:
                          result['dividendRate'] = div_val
                          result['exDividendDate'] = ex_date
                          print(f"    └─ ZSE dividend: {div_val} EUR, ex-date {ex_date}")
              except Exception as de:
                  print(f"    └─ ZSE dividend scrape skipped: {de}")
              return result

          prices = {}
          div_history = {}
          for key, source_ticker in ticker_map.items():
              try:
                  upper = source_ticker.upper()
                  if upper.endswith('.ZSE'):
                      result = fetch_zse(key, source_ticker)
                  elif upper.endswith('.ZS'):
                      result = fetch_stooq(key, source_ticker)
                  else:
                      result = fetch_yahoo(key, source_ticker)
                  prices[key] = result
                  print(f"  {key}: {result['price']} {result['currency']} ({result['name']})")

                  # Dividend history
                  if upper.endswith('.ZSE'):
                      # ZSE: use the dividend scraped from the web page
                      if result.get('exDividendDate') and result.get('dividendRate'):
                          div_history[key] = [{'date': result['exDividendDate'], 'amount': result['dividendRate']}]
                  elif not upper.endswith('.ZS'):
                      try:
                          divs = fetch_yahoo_dividends(key, source_ticker)
                          if divs:
                              div_history[key] = divs
                              print(f"    └─ {len(divs)} dividend payment(s) found")
                      except Exception as de:
                          print(f"    └─ div history skipped: {de}")
                      time.sleep(0.2)

              except Exception as e:
                  print(f"  {key} ({source_ticker}): FAILED — {e}")
              time.sleep(0.3)

          # Fetch EUR FX rates
          fx = {'USD': 1.08, 'GBP': 0.85, 'CAD': 1.56, 'HRK': 7.53}
          try:
              req = urllib.request.Request('https://open.er-api.com/v6/latest/EUR', headers=HEADERS)
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              if data.get('rates'):
                  fx['USD'] = data['rates'].get('USD', fx['USD'])
                  fx['GBP'] = data['rates'].get('GBP', fx['GBP'])
                  fx['CAD'] = data['rates'].get('CAD', fx['CAD'])
                  fx['HRK'] = data['rates'].get('HRK', fx['HRK'])
                  print(f"FX rates: {fx}")
          except Exception as e:
              print(f"FX fetch failed (using defaults): {e}")

          result = {
              'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'prices': prices,
              'fx': fx,
              'div_history': div_history
          }

          with open('prices.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(f"\nSaved prices.json with {len(prices)}/{len(ticker_map)} prices")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
